<svg viewBox="0 0 860 240" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="13">
  <rect width="860" height="240" fill="#1e1e2e" rx="12"/>

  <!-- BLE Keyboard -->
  <rect x="20" y="30" width="145" height="80" rx="8" fill="#2a2a4a" stroke="#4a9eff" stroke-width="2"/>
  <text x="93" y="62" fill="#4a9eff" font-size="13" font-weight="bold" text-anchor="middle">BLE Keyboard</text>
  <text x="93" y="80" fill="#aaa" font-size="11" text-anchor="middle">HID over BLE 5.0</text>
  <text x="93" y="96" fill="#aaa" font-size="11" text-anchor="middle">(any device)</text>

  <!-- BLE Mouse -->
  <rect x="20" y="130" width="145" height="80" rx="8" fill="#2a2a4a" stroke="#cc88ff" stroke-width="2"/>
  <text x="93" y="162" fill="#cc88ff" font-size="13" font-weight="bold" text-anchor="middle">BLE Mouse</text>
  <text x="93" y="180" fill="#aaa" font-size="11" text-anchor="middle">HID over BLE 5.0</text>
  <text x="93" y="196" fill="#aaa" font-size="11" text-anchor="middle">(any device)</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#cc88ff"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff9944"/></marker>
  </defs>

  <!-- Arrow keyboard → ESP32 -->
  <line x1="165" y1="70" x2="235" y2="90" stroke="#4a9eff" stroke-width="2" marker-end="url(#a1)"/>
  <text x="192" y="72" fill="#4a9eff" font-size="10" text-anchor="middle">BLE 5.0</text>

  <!-- Arrow mouse → ESP32 -->
  <line x1="165" y1="170" x2="235" y2="150" stroke="#cc88ff" stroke-width="2" marker-end="url(#a2)"/>
  <text x="192" y="178" fill="#cc88ff" font-size="10" text-anchor="middle">BLE 5.0</text>

  <!-- ESP32-S3 -->
  <rect x="235" y="30" width="210" height="180" rx="8" fill="#1a3a1a" stroke="#78d878" stroke-width="2"/>
  <text x="340" y="57" fill="#78d878" font-size="13" font-weight="bold" text-anchor="middle">ESP32-S3 N16R8</text>
  <text x="340" y="76" fill="#aaa" font-size="10" text-anchor="middle">NimBLE-Arduino 2.x</text>
  <text x="340" y="93" fill="#aaa" font-size="10" text-anchor="middle">2× BLE HID host (simultaneous)</text>
  <text x="340" y="110" fill="#aaa" font-size="10" text-anchor="middle">USB HID keyboard + mouse</text>
  <text x="340" y="127" fill="#aaa" font-size="10" text-anchor="middle">Keyboard: typematic, LED sync</text>
  <text x="340" y="144" fill="#aaa" font-size="10" text-anchor="middle">Mouse: 5 buttons, wheel, scale</text>
  <text x="340" y="161" fill="#aaa" font-size="10" text-anchor="middle">Independent auto-reconnect</text>
  <text x="340" y="178" fill="#aaa" font-size="10" text-anchor="middle">NVS storage for both devices</text>
  <text x="340" y="195" fill="#aaa" font-size="10" text-anchor="middle">FreeRTOS BLE daemon</text>

  <!-- Arrow ESP32 → PC -->
  <line x1="445" y1="120" x2="545" y2="120" stroke="#ff9944" stroke-width="2" marker-end="url(#a3)"/>
  <text x="495" y="112" fill="#ff9944" font-size="10" text-anchor="middle">USB-C</text>
  <text x="495" y="132" fill="#ff9944" font-size="10" text-anchor="middle">HID (kbd+mouse)</text>

  <!-- PC -->
  <rect x="545" y="70" width="110" height="100" rx="8" fill="#2a2a4a" stroke="#ff9944" stroke-width="2"/>
  <text x="600" y="102" fill="#ff9944" font-size="13" font-weight="bold" text-anchor="middle">PC</text>
  <text x="600" y="120" fill="#aaa" font-size="10" text-anchor="middle">USB HID keyboard</text>
  <text x="600" y="136" fill="#aaa" font-size="10" text-anchor="middle">USB HID mouse</text>
  <text x="600" y="153" fill="#aaa" font-size="10" text-anchor="middle">plug &amp; play</text>

  <text x="430" y="226" fill="#555" font-size="11" text-anchor="middle">Single USB-C cable — no extra components needed</text>
</svg>
