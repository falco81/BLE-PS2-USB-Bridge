<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">

  <rect width="960" height="500" fill="#1e1e2e" rx="12"/>
  <text x="480" y="36" fill="#eee" font-size="15" font-weight="bold" text-anchor="middle">BLE → PS/2 Keyboard + Mouse — Wiring Diagram</text>

  <!--
    Pin Y centres (rect_y + 11):
      3V3 / LV / HV     y=120  centre=131
      GND               y=153  centre=164
      IO19 / A1 / B1    y=193  centre=204   KB CLK
      IO18 / A2 / B2    y=233  centre=244   KB DATA
        ···
      IO16 / A3 / B3    y=348  centre=359   Mouse CLK  ← same as Mouse pin 5
      IO17 / A4 / B4    y=380  centre=391   Mouse DATA ← same as Mouse pin 1
      VIN               y=412  centre=423
  -->

  <!-- ── ESP32 ── -->
  <rect x="15" y="55" width="185" height="405" rx="8" fill="#2a2a3e" stroke="#4a9eff" stroke-width="2"/>
  <text x="107" y="80" fill="#4a9eff" font-size="13" font-weight="bold" text-anchor="middle">ESP32-WROOM-32</text>

  <rect x="160" y="120" width="40" height="22" rx="4" fill="#3a3a5e" stroke="#4a9eff" stroke-width="1"/>
  <text x="180" y="136" fill="#4a9eff"  font-size="11" text-anchor="middle">3V3</text>

  <rect x="160" y="153" width="40" height="22" rx="4" fill="#3a3a5e" stroke="#ff6b6b" stroke-width="1"/>
  <text x="180" y="169" fill="#ff6b6b"  font-size="11" text-anchor="middle">GND</text>

  <rect x="160" y="193" width="40" height="22" rx="4" fill="#3a3a5e" stroke="#a0e878" stroke-width="1"/>
  <text x="180" y="209" fill="#a0e878"  font-size="11" text-anchor="middle">IO19</text>
  <text x="94"  y="209" fill="#a0e878"  font-size="10" text-anchor="middle">KB CLK</text>

  <rect x="160" y="233" width="40" height="22" rx="4" fill="#3a3a5e" stroke="#ffd700" stroke-width="1"/>
  <text x="180" y="249" fill="#ffd700"  font-size="11" text-anchor="middle">IO18</text>
  <text x="91"  y="249" fill="#ffd700"  font-size="10" text-anchor="middle">KB DATA</text>

  <text x="107" y="300" fill="#444" font-size="11" text-anchor="middle">· · ·</text>

  <rect x="160" y="348" width="40" height="22" rx="4" fill="#3a3a5e" stroke="#ff88cc" stroke-width="1"/>
  <text x="180" y="364" fill="#ff88cc"  font-size="11" text-anchor="middle">IO16</text>
  <text x="86"  y="364" fill="#ff88cc"  font-size="10" text-anchor="middle">Mouse CLK</text>

  <rect x="160" y="380" width="40" height="22" rx="4" fill="#3a3a5e" stroke="#ff9944" stroke-width="1"/>
  <text x="180" y="396" fill="#ff9944"  font-size="11" text-anchor="middle">IO17</text>
  <text x="83"  y="396" fill="#ff9944"  font-size="10" text-anchor="middle">Mouse DATA</text>

  <rect x="160" y="412" width="40" height="22" rx="4" fill="#3a3a5e" stroke="#ff6b6b" stroke-width="1"/>
  <text x="180" y="428" fill="#ff6b6b"  font-size="11" text-anchor="middle">VIN</text>
  <text x="110" y="428" fill="#ff6b6b"  font-size="10" text-anchor="middle">5V</text>

  <!-- ── Level Shifter ── -->
  <rect x="305" y="55" width="280" height="405" rx="8" fill="#2a3a2a" stroke="#78d878" stroke-width="2"/>
  <text x="445" y="78" fill="#78d878" font-size="13" font-weight="bold" text-anchor="middle">BSS138 Level Shifter</text>
  <text x="445" y="95" fill="#78d878" font-size="11" text-anchor="middle">IIC I2C 5V ↔ 3.3V · 1 module</text>

  <!-- Column header labels — centred over each pin column, clear of box border -->
  <text x="336" y="113" fill="#aaa" font-size="11" text-anchor="middle">LV (3.3V)</text>
  <text x="554" y="113" fill="#aaa" font-size="11" text-anchor="middle">HV (5V)</text>

  <!-- LV pins -->
  <rect x="318" y="120" width="36" height="22" rx="3" fill="#2a4a2a" stroke="#4a9eff" stroke-width="1"/>
  <text x="336" y="136" fill="#4a9eff"  font-size="11" text-anchor="middle">LV</text>

  <rect x="318" y="153" width="36" height="22" rx="3" fill="#2a4a2a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="336" y="169" fill="#ff6b6b"  font-size="11" text-anchor="middle">GND</text>

  <rect x="318" y="193" width="36" height="22" rx="3" fill="#2a4a2a" stroke="#a0e878" stroke-width="1"/>
  <text x="336" y="209" fill="#a0e878"  font-size="11" text-anchor="middle">A1</text>

  <rect x="318" y="233" width="36" height="22" rx="3" fill="#2a4a2a" stroke="#ffd700" stroke-width="1"/>
  <text x="336" y="249" fill="#ffd700"  font-size="11" text-anchor="middle">A2</text>

  <text x="445" y="300" fill="#444" font-size="11" text-anchor="middle">· · ·</text>

  <rect x="318" y="348" width="36" height="22" rx="3" fill="#2a4a2a" stroke="#ff88cc" stroke-width="1"/>
  <text x="336" y="364" fill="#ff88cc"  font-size="11" text-anchor="middle">A3</text>

  <rect x="318" y="380" width="36" height="22" rx="3" fill="#2a4a2a" stroke="#ff9944" stroke-width="1"/>
  <text x="336" y="396" fill="#ff9944"  font-size="11" text-anchor="middle">A4</text>

  <!-- channel labels centre -->
  <text x="445" y="209" fill="#555" font-size="9" text-anchor="middle">── KB CLK ──</text>
  <text x="445" y="249" fill="#555" font-size="9" text-anchor="middle">── KB DATA ──</text>
  <text x="445" y="364" fill="#555" font-size="9" text-anchor="middle">── Mouse CLK ──</text>
  <text x="445" y="396" fill="#555" font-size="9" text-anchor="middle">── Mouse DATA ──</text>

  <!-- GND internal bridge -->
  <line x1="354" y1="164" x2="536" y2="164" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="445" y="159" fill="#ff6b6b" font-size="8" text-anchor="middle" opacity="0.5">internally connected</text>

  <!-- HV pins -->
  <rect x="536" y="120" width="36" height="22" rx="3" fill="#3a2a2a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="554" y="136" fill="#ff6b6b"  font-size="11" text-anchor="middle">HV</text>

  <rect x="536" y="153" width="36" height="22" rx="3" fill="#3a2a2a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="554" y="169" fill="#ff6b6b"  font-size="11" text-anchor="middle">GND</text>

  <rect x="536" y="193" width="36" height="22" rx="3" fill="#3a2a2a" stroke="#a0e878" stroke-width="1"/>
  <text x="554" y="209" fill="#a0e878"  font-size="11" text-anchor="middle">B1</text>

  <rect x="536" y="233" width="36" height="22" rx="3" fill="#3a2a2a" stroke="#ffd700" stroke-width="1"/>
  <text x="554" y="249" fill="#ffd700"  font-size="11" text-anchor="middle">B2</text>

  <rect x="536" y="348" width="36" height="22" rx="3" fill="#3a2a2a" stroke="#ff88cc" stroke-width="1"/>
  <text x="554" y="364" fill="#ff88cc"  font-size="11" text-anchor="middle">B3</text>

  <rect x="536" y="380" width="36" height="22" rx="3" fill="#3a2a2a" stroke="#ff9944" stroke-width="1"/>
  <text x="554" y="396" fill="#ff9944"  font-size="11" text-anchor="middle">B4</text>

  <!-- ── PS/2 Keyboard connector ── -->
  <rect x="700" y="75" width="245" height="200" rx="8" fill="#2a2a3e" stroke="#cc88ff" stroke-width="2"/>
  <text x="822" y="99"  fill="#cc88ff" font-size="13" font-weight="bold" text-anchor="middle">PS/2 Keyboard</text>
  <text x="822" y="115" fill="#cc88ff" font-size="11" text-anchor="middle">Mini-DIN 6 · GPIO19 / 18</text>

  <rect x="710" y="124" width="38" height="22" rx="3" fill="#2a2a4a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="729" y="140" fill="#ff6b6b" font-size="11" text-anchor="middle">pin 4</text>
  <text x="808" y="140" fill="#ff6b6b" font-size="11">+5V</text>

  <rect x="710" y="153" width="38" height="22" rx="3" fill="#2a2a4a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="729" y="169" fill="#ff6b6b" font-size="11" text-anchor="middle">pin 3</text>
  <text x="808" y="169" fill="#ff6b6b" font-size="11">GND</text>

  <rect x="710" y="193" width="38" height="22" rx="3" fill="#2a2a4a" stroke="#a0e878" stroke-width="1"/>
  <text x="729" y="209" fill="#a0e878" font-size="11" text-anchor="middle">pin 5</text>
  <text x="808" y="209" fill="#a0e878" font-size="11">CLK</text>

  <rect x="710" y="233" width="38" height="22" rx="3" fill="#2a2a4a" stroke="#ffd700" stroke-width="1"/>
  <text x="729" y="249" fill="#ffd700" font-size="11" text-anchor="middle">pin 1</text>
  <text x="808" y="249" fill="#ffd700" font-size="11">DATA</text>

  <!-- ── PS/2 Mouse connector ── -->
  <rect x="700" y="295" width="245" height="175" rx="8" fill="#2a2a3e" stroke="#cc88ff" stroke-width="2"/>
  <text x="822" y="319" fill="#cc88ff" font-size="13" font-weight="bold" text-anchor="middle">PS/2 Mouse</text>
  <text x="822" y="335" fill="#cc88ff" font-size="11" text-anchor="middle">Mini-DIN 6 · GPIO16 / 17</text>

  <!-- pin 5 CLK at y=348 → centre=359 → matches B3 centre ✓ -->
  <rect x="710" y="348" width="38" height="22" rx="3" fill="#2a2a4a" stroke="#ff88cc" stroke-width="1"/>
  <text x="729" y="364" fill="#ff88cc" font-size="11" text-anchor="middle">pin 5</text>
  <text x="808" y="364" fill="#ff88cc" font-size="11">CLK</text>

  <!-- pin 1 DATA at y=380 → centre=391 → matches B4 centre ✓ -->
  <rect x="710" y="380" width="38" height="22" rx="3" fill="#2a2a4a" stroke="#ff9944" stroke-width="1"/>
  <text x="729" y="396" fill="#ff9944" font-size="11" text-anchor="middle">pin 1</text>
  <text x="808" y="396" fill="#ff9944" font-size="11">DATA</text>

  <rect x="710" y="412" width="38" height="22" rx="3" fill="#2a2a4a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="729" y="428" fill="#ff6b6b" font-size="11" text-anchor="middle">pin 3</text>
  <text x="808" y="428" fill="#ff6b6b" font-size="11">GND</text>

  <rect x="710" y="444" width="38" height="22" rx="3" fill="#2a2a4a" stroke="#555" stroke-width="1"/>
  <text x="729" y="460" fill="#555" font-size="11" text-anchor="middle">pin 4</text>
  <text x="808" y="460" fill="#555" font-size="11">+5V  NC</text>

  <!-- ══ POWER BUS (dashed, drawn before signals) ══ -->

  <!-- 5V: HV(572,131) → KB pin4(710,135) — single horizontal dashed -->
  <line x1="572" y1="131" x2="710" y2="131" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- GND: GND_R(572,164) → rail x=678 → KB pin3(164) + Mouse pin3(423) -->
  <line x1="572" y1="164" x2="678" y2="164" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="678" y1="164" x2="678" y2="423" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="678" y1="164" x2="710" y2="164" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="678" y1="423" x2="710" y2="423" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- VIN → HV bottom rail -->
  <line x1="200" y1="423" x2="220" y2="423" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="220" y1="423" x2="220" y2="470" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="220" y1="470" x2="618" y2="470" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="618" y1="470" x2="618" y2="131" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="572" y1="131" x2="618" y2="131" stroke="#ff6b6b" stroke-width="2"/>

  <!-- ══ SIGNAL WIRES (drawn on top) — all perfectly horizontal ══ -->

  <!-- Left: ESP32 → Shifter LV -->
  <line x1="200" y1="131" x2="318" y2="131" stroke="#4a9eff" stroke-width="2"/>
  <line x1="200" y1="164" x2="318" y2="164" stroke="#ff6b6b" stroke-width="2"/>
  <line x1="200" y1="204" x2="318" y2="204" stroke="#a0e878" stroke-width="2"/>
  <line x1="200" y1="244" x2="318" y2="244" stroke="#ffd700" stroke-width="2"/>
  <line x1="200" y1="359" x2="318" y2="359" stroke="#ff88cc" stroke-width="2"/>
  <line x1="200" y1="391" x2="318" y2="391" stroke="#ff9944" stroke-width="2"/>

  <!-- Right: Shifter B → connectors — ALL straight horizontal, same Y both ends -->
  <!-- B1(572,204) → KB CLK pin5(710,204) -->
  <line x1="572" y1="204" x2="710" y2="204" stroke="#a0e878" stroke-width="2"/>
  <!-- B2(572,244) → KB DATA pin1(710,244) -->
  <line x1="572" y1="244" x2="710" y2="244" stroke="#ffd700" stroke-width="2"/>
  <!-- B3(572,359) → Mouse CLK pin5(710,359) -->
  <line x1="572" y1="359" x2="710" y2="359" stroke="#ff88cc" stroke-width="2"/>
  <!-- B4(572,391) → Mouse DATA pin1(710,391) -->
  <line x1="572" y1="391" x2="710" y2="391" stroke="#ff9944" stroke-width="2"/>

  <text x="480" y="490" fill="#555" font-size="10" text-anchor="middle">GPIO19=KB CLK · GPIO18=KB DATA · GPIO16=Mouse CLK · GPIO17=Mouse DATA · all open-drain (GPIO_MODE_OUTPUT_OD)</text>

</svg>
